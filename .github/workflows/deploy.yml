name: deploy

# Auto-deploy to https://void.retraut.workers.dev on push to main.
# Manual dispatch also available for re-deploying without a new commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time. Never cancel an in-flight deploy — the
# previous version is still live and serving traffic; cancelling
# could leave the worker in a half-deployed state.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read  # checkout

jobs:
  deploy-worker:
    name: Deploy worker to Cloudflare Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          # Only the OAuth secrets needed at deploy time. Everything
          # else (Hetzner, Cloudflare API, GitHub App, agent HMAC,
          # etc.) is set inside the panel itself after deploy — the
          # worker reads them from D1 (encrypted) at runtime. This
          # keeps the GitHub repo's secret footprint to the bare
          # minimum needed for the deploy itself.
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          command: deploy
          secrets: |
            GITHUB_CLIENT_ID
            ${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET
            ${{ secrets.GITHUB_CLIENT_SECRET }}

      - name: Smoke-test the live URL
        run: |
          sleep 5
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://void.retraut.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "✕ /health returned $STATUS, expected 200"
            exit 1
          fi
          echo "✓ /health returned 200"
          curl -sS https://void.retraut.workers.dev/health
