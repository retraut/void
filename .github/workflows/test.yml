name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          # Root has the pnpm-lock.yaml; worker is a sub-package.
          # Cache key is hashed from this file's content, so any
          # dep change (root or worker) invalidates the cache.
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Vitest
        # Run BOTH reporters: the `default` one for the readable
        # log (tee'd to a file), the `json` one for structured
        # data (written to vitest-results.json for jq to parse).
        run: pnpm vitest run --reporter=default --reporter=json --outputFile.json=vitest-results.json 2>&1 | tee vitest-log.txt
      - name: Publish test summary
        if: always()
        # Strip ANSI escape codes from the readable log, then
        # render a clean markdown summary. The summary always
        # shows (even on failure) so you can see what passed
        # and what broke without scrolling through raw logs.
        run: |
          # Strip ANSI escape sequences: ESC[...m (colors) and
          # OSC...ST (terminal titles). Cover both just in case
          # vitest emits other sequences we don't know about.
          sed -i -E 's/\x1b\[[0-9;?]*[a-zA-Z]//g; s/\x1b\][^\x07]*\x07//g' vitest-log.txt

          {
            echo "## Vitest summary"

            if [ -s vitest-results.json ]; then
              # Pull headline numbers out of the JSON
              TOTAL=$(jq -r '.numTotalTests // 0' vitest-results.json)
              PASSED=$(jq -r '.numPassedTests // 0' vitest-results.json)
              FAILED=$(jq -r '.numFailedTests // 0' vitest-results.json)
              SUITES=$(jq -r '.numTotalTestSuites // 0' vitest-results.json)
              SUITES_PASSED=$(jq -r '.numPassedTestSuites // 0' vitest-results.json)
              SUCCESS=$(jq -r '.success // false' vitest-results.json)

              # Status badge
              if [ "$FAILED" = "0" ] && [ "$SUCCESS" = "true" ]; then
                echo ""
                echo "✅ **All tests passed**"
              else
                echo ""
                echo "❌ **$FAILED test(s) failed**"
              fi

              echo ""
              echo "| Metric | Value |"
              echo "|---|---|"
              echo "| Test files | $SUITES_PASSED / $SUITES passed |"
              echo "| Tests | $PASSED / $TOTAL passed |"
              echo "| Failed | $FAILED |"

              # Duration from the JSON (startTime is ms epoch)
              START=$(jq -r '.startTime // 0' vitest-results.json)
              if [ "$START" != "0" ]; then
                # Sum endTime - startTime across all test files
                DURATION_MS=$(jq -r '
                  ([.testResults[]? | (.endTime // 0) - (.startTime // 0)] | add) // 0
                ' vitest-results.json)
                DURATION_S=$(awk -v ms="$DURATION_MS" 'BEGIN { printf "%.2f", ms / 1000 }')
                echo "| Wall time | ${DURATION_S}s |"
              fi
            else
              echo ""
              echo "⚠️ vitest-results.json was not produced (vitest crashed before finishing)"
            fi

            # Per-file breakdown
            if [ -s vitest-results.json ]; then
              echo ""
              echo "### Per file"
              echo ""
              echo "| File | Tests | Passed | Failed | Duration |"
              echo "|---|---|---|---|---|"
              jq -r '
                .testResults[]? |
                "|\(.name | sub(".*/worker/"; ""))|\(.assertionResults | length)|\([.assertionResults[] | select(.status == "passed")] | length)|\([.assertionResults[] | select(.status == "failed")] | length)|\(((.endTime // 0) - (.startTime // 0)))ms|"
              ' vitest-results.json
            fi

            # Full log under a collapsible block
            echo ""
            echo "<details>"
            echo "<summary>Full vitest log</summary>"
            echo ""
            echo '```'
            cat vitest-log.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-results
          path: |
            worker/vitest-log.txt
            worker/vitest-results.json
          if-no-files-found: ignore

  cloud-init:
    name: Cloud-init smoke test
    runs-on: ubuntu-latest
    # ubuntu-latest runners have Docker pre-installed and the daemon
    # running by default — `docker build` and `docker run` work out of
    # the box.
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate user_data (vitest)
        # JSON output for the summary, default output for the log
        run: pnpm vitest run test/cloud-init.test.ts --reporter=default --reporter=json --outputFile.json=cloud-init-vitest-results.json 2>&1 | tee cloud-init-vitest-log.txt
      - name: Generate user_data
        run: pnpm exec tsx scripts/extract-cloud-init.mts
      - name: Build & run Docker smoke test
        # Runs the extracted cloud-init in a fresh Ubuntu 26.04 container.
        # The script fetches the real void-agent from
        # github.com/retraut/void/releases/latest. If the most recent
        # release only has a binary that can't run on Linux 26.04
        # (e.g. a macOS Mach-O by mistake), the test will run the
        # script up to the agent extract, then fail on the cosmetic
        # `$(... --version)` echo. That's a real release-time bug,
        # not a code bug — the workflow logs show exactly which
        # step failed.
        run: bash scripts/test-cloud-init.sh
      - name: Publish test summary
        if: always()
        run: |
          sed -i -E 's/\x1b\[[0-9;?]*[a-zA-Z]//g; s/\x1b\][^\x07]*\x07//g' cloud-init-vitest-log.txt

          {
            echo "## Cloud-init vitest summary"

            if [ -s cloud-init-vitest-results.json ]; then
              TOTAL=$(jq -r '.numTotalTests // 0' cloud-init-vitest-results.json)
              PASSED=$(jq -r '.numPassedTests // 0' cloud-init-vitest-results.json)
              FAILED=$(jq -r '.numFailedTests // 0' cloud-init-vitest-results.json)
              SUCCESS=$(jq -r '.success // false' cloud-init-vitest-results.json)

              if [ "$FAILED" = "0" ] && [ "$SUCCESS" = "true" ]; then
                echo ""
                echo "✅ **All tests passed**"
              else
                echo ""
                echo "❌ **$FAILED test(s) failed**"
              fi

              echo ""
              echo "| Metric | Value |"
              echo "|---|---|"
              echo "| Tests | $PASSED / $TOTAL passed |"
              echo "| Failed | $FAILED |"

              echo ""
              echo "<details>"
              echo "<summary>Full vitest log</summary>"
              echo ""
              echo '```'
              cat cloud-init-vitest-log.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo ""
              echo "⚠️ cloud-init-vitest-results.json was not produced"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bootstrap log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-bootstrap-log
          path: worker/test/output/
          if-no-files-found: ignore
      - name: Upload vitest log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-vitest-log
          path: |
            worker/cloud-init-vitest-log.txt
            worker/cloud-init-vitest-results.json
          if-no-files-found: ignore
