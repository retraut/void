name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          # Root has the pnpm-lock.yaml; worker is a sub-package.
          # Cache key is hashed from this file's content, so any
          # dep change (root or worker) invalidates the cache.
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Vitest
        # vitest.config.mts auto-enables the `github-actions` reporter
        # when GITHUB_ACTIONS=true, which:
        #   - Emits `::error file=... line=...` annotations for every
        #     failing assertion (shows up inline in the PR diff)
        #   - Writes a clean job summary to $GITHUB_STEP_SUMMARY
        #     with per-file/test stats and source-line permalinks
        # `tee` keeps the readable log around as an artifact on failure.
        run: pnpm vitest run --reporter=json --outputFile.json=vitest-results.json 2>&1 | tee vitest-log.txt
      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-results
          path: |
            worker/vitest-log.txt
            worker/vitest-results.json
          if-no-files-found: ignore

  agent-json-logs:
    name: Agent JSON logging
    runs-on: ubuntu-latest
    # Build the void-agent release binary and verify that running it
    # with LOG_FORMAT=json produces valid newline-delimited JSON
    # on stderr. This catches regressions in the tracing-subscriber
    # wiring (e.g. someone adding a field that Debug-formats a
    # PathBuf — produces invalid JSON when wrapped by the json layer).
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Build void-agent (release)
        run: cargo build --release
      - name: Run agent with LOG_FORMAT=json and validate output
        # The agent will try to connect to ws://127.0.0.1:8787 and
        # fail (no server is running here) — that's fine, we just
        # need to capture the structured log output and validate it.
        # We let it run for ~3 seconds so the connect-fail-retry
        # loop emits a few log lines, then kill it.
        run: |
          rm -f agent-json.log
          # Run the agent in the background, capture stderr.
          LOG_FORMAT=json ./target/release/void-agent \
            2> agent-json.log &
          AGENT_PID=$!
          sleep 3
          kill -9 "$AGENT_PID" 2>/dev/null || true
          wait "$AGENT_PID" 2>/dev/null || true
          # Sanity: we should have written at least 1 line of output.
          if [ ! -s agent-json.log ]; then
            echo "✕ agent-json.log is empty"
            exit 1
          fi
          # The file is NDJSON (one JSON object per line). Use jq -s
          # to slurp all lines into a single array, then validate
          # each element. (Bare 'jq -e .' would try to parse the
          # whole file as one JSON value and fail with
          # 'Cannot index string' — the first line is an object,
          # but jq reads the whole file as a stream and trips on
          # the second.)
          TOTAL=$(wc -l < agent-json.log)
          if ! jq -s -e 'all(.[]; type == "object")' agent-json.log >/dev/null 2>&1; then
            echo "✕ at least one line in agent-json.log is NOT a JSON object"
            echo "--- raw output ---"
            cat agent-json.log
            echo "--- end raw output ---"
            exit 1
          fi
          # Every record must have these fields.
          missing=$(jq -sr '
            [
              to_entries[] |
              select(
                (.value.timestamp // "") == ""
                or (.value.level // "") == ""
                or (.value.message // "") == ""
                or (.value.target // "") == ""
              ) | .key + 1
            ] | join(",")
          ' agent-json.log)
          if [ -n "$missing" ]; then
            echo "✕ lines missing required fields (1-indexed): $missing"
            jq -s . agent-json.log
            exit 1
          fi
          echo "✓ all $TOTAL lines are valid JSON objects with the expected schema"
          echo "  first 3 records:"
          head -3 agent-json.log | jq -c .
      - name: Upload agent log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: agent-json-log
          path: agent/agent-json.log
          if-no-files-found: ignore

  cloud-init:
    name: Cloud-init smoke test
    runs-on: ubuntu-latest
    # ubuntu-latest runners have Docker pre-installed and the daemon
    # running by default — `docker build` and `docker run` work out of
    # the box.
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate user_data (vitest)
        run: pnpm vitest run test/cloud-init.test.ts --reporter=json --outputFile.json=cloud-init-vitest-results.json 2>&1 | tee cloud-init-vitest-log.txt
      - name: Generate user_data
        run: pnpm exec tsx scripts/extract-cloud-init.mts
      - name: Build & run Docker smoke test
        # Runs the extracted cloud-init in a fresh Ubuntu 26.04 container.
        # The script fetches the real void-agent from
        # github.com/retraut/void/releases/latest. If the most recent
        # release only has a binary that can't run on Linux 26.04
        # (e.g. a macOS Mach-O by mistake), the test will run the
        # script up to the agent extract, then fail on the cosmetic
        # `$(... --version)` echo. That's a real release-time bug,
        # not a code bug — the workflow logs show exactly which
        # step failed.
        run: bash scripts/test-cloud-init.sh
      - name: Upload bootstrap log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-bootstrap-log
          path: worker/test/output/
          if-no-files-found: ignore
      - name: Upload vitest log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-vitest-log
          path: |
            worker/cloud-init-vitest-log.txt
            worker/cloud-init-vitest-results.json
          if-no-files-found: ignore
