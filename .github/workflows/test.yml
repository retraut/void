name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          # Root has the pnpm-lock.yaml; worker is a sub-package.
          # Cache key is hashed from this file's content, so any
          # dep change (root or worker) invalidates the cache.
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Vitest
        id: vitest
        # `--reporter=default` (vitest 4 dropped `basic`).
        # `tee` so we can both display in the log AND attach to the
        # job summary in the next step.
        run: pnpm vitest run --reporter=default 2>&1 | tee test-results.txt
      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## Vitest summary"
            echo ""
            if [ -s test-results.txt ]; then
              echo "<details><summary>Show full output</summary>"
              echo ""
              echo '```'
              cat test-results.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "_no output captured_"
            fi
            # Pull a few headline numbers out of the log so they
            # show up at the top of the summary even when the
            # details block is collapsed.
            echo "### Headline"
            echo ""
            if grep -E 'Tests +[0-9]+ (passed|failed)' test-results.txt >/dev/null 2>&1; then
              grep -E 'Test Files +[0-9]+ (passed|failed)|Tests +[0-9]+ (passed|failed)|Duration' test-results.txt \
                | sed 's/^[[:space:]]*//' \
                | head -5 \
                | awk 'BEGIN{print "| Metric | Value |"; print "|---|---|"} {print "| " $0 " |"}'
            else
              echo "_no summary line found_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  cloud-init:
    name: Cloud-init smoke test
    runs-on: ubuntu-latest
    # ubuntu-latest runners have Docker pre-installed and the daemon
    # running by default — `docker build` and `docker run` work out of
    # the box.
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate user_data (vitest)
        # `--reporter=default` (vitest 4 dropped `basic`).
        # `tee` so the output is preserved if a later Docker step
        # fails — uploaded to artifacts on any failure below.
        run: pnpm vitest run test/cloud-init.test.ts --reporter=default 2>&1 | tee test-results.txt
      - name: Generate user_data
        run: pnpm exec tsx scripts/extract-cloud-init.mts
      - name: Build & run Docker smoke test
        # Runs the extracted cloud-init in a fresh Ubuntu 26.04 container.
        # The script fetches the real void-agent from
        # github.com/retraut/void/releases/latest. If the most recent
        # release only has a binary that can't run on Linux 26.04
        # (e.g. a macOS Mach-O by mistake), the test will run the
        # script up to the agent extract, then fail on the cosmetic
        # `$(... --version)` echo. That's a real release-time bug,
        # not a code bug — the workflow logs show exactly which
        # step failed.
        run: bash scripts/test-cloud-init.sh
      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## Cloud-init vitest summary"
            echo ""
            if [ -s test-results.txt ]; then
              echo "<details><summary>Show full output</summary>"
              echo ""
              echo '```'
              cat test-results.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "_no output captured_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bootstrap log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-bootstrap-log
          path: worker/test/output/
          if-no-files-found: ignore
      - name: Upload vitest log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-init-vitest-log
          path: worker/test-results.txt
          if-no-files-found: ignore
